name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Prevent overlapping deploys; let the latest one win.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static site to /opt/ukibori
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.playwright-mcp' \
            --exclude='deploy' \
            --exclude='README.md' \
            --exclude='DESIGN_SPEC*.md' \
            --exclude='ui-check.png' \
            ./ "${SSH_USER}@${SSH_HOST}:/opt/ukibori/"

      - name: Provision nginx + TLS (certbot)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL }}
        run: |
          # Ship the provisioning script + nginx config (excluded from the site
          # mirror above) to a staging dir, then run it on the server.
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./deploy/ "${SSH_USER}@${SSH_HOST}:/tmp/ukibori-deploy/"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "CERTBOT_EMAIL='${CERTBOT_EMAIL}' bash /tmp/ukibori-deploy/provision.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
