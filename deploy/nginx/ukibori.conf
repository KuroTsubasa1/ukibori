# Ukibori — static site vhost for ukibori.lasseharm.space
# Install to: /etc/nginx/sites-available/ukibori.conf
# Enable with: ln -s /etc/nginx/sites-available/ukibori.conf /etc/nginx/sites-enabled/

# Redirect all HTTP traffic to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name ukibori.lasseharm.space;

    # Allow Let's Encrypt HTTP-01 challenges to be served over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ukibori.lasseharm.space;

    root /opt/ukibori;
    index index.html;

    # TLS — managed by certbot (see deploy/README.md).
    ssl_certificate     /etc/letsencrypt/live/ukibori.lasseharm.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ukibori.lasseharm.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    # Zone name must be unique server-wide (other vhosts use "SSL").
    ssl_session_cache   shared:ukibori_SSL:10m;
    ssl_session_timeout 1d;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache fingerprint-able static assets aggressively, HTML not at all.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
