<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ukibori · 浮彫</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<script>window.__errs=[];addEventListener('error',e=>window.__errs.push(String(e.message)))</script>
</head>
<body>
<header id="topbar">
  <span class="brand">ukibori</span>
  <div id="viewToggle" class="seg-group" role="tablist" aria-label="Ansicht">
    <button type="button" id="viewSimple" class="seg seg-active">Einfach</button>
    <button type="button" id="viewAdvanced" class="seg">Erweitert</button>
  </div>
  <div class="topbar-actions">
    <button type="button" id="openBtn">Öffnen</button>
    <button type="button" id="saveBtn">Speichern</button>
    <button type="button" id="exportBtn">Exportieren</button>
    <button type="button" id="tourBtn" aria-label="Tour">?</button>
  </div>
</header>
<main id="editor">
  <aside id="sidebarSimple" class="sidebar">
    <!-- Simple controls (Task 4a) -->
    <div class="sp-section">
      <div class="sp-label">Hinzufügen</div>
      <div class="sp-add-row">
        <button type="button" id="addImageBtn" class="btn">Bild</button>
        <button type="button" id="addTextBtn" class="btn">Text</button>
        <button type="button" id="addQrBtn" class="btn">QR</button>
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">Tiefe</div>
      <div id="depthSeg" class="seg-group seg-sm" style="width:100%">
        <button type="button" id="depthRaised" class="seg seg-active" style="flex:1">Erhaben</button>
        <button type="button" id="depthEngraved" class="seg" style="flex:1">Vertieft</button>
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">Form</div>
      <div id="shapeSeg" class="seg-group seg-sm" style="width:100%">
        <button type="button" id="shapeRect" class="seg seg-active" style="flex:1">Rechteck</button>
        <button type="button" id="shapeCircle" class="seg" style="flex:1">Kreis</button>
        <button type="button" id="shapeFree" class="seg" style="flex:1">Frei</button>
      </div>
      <div id="borderField" class="sp-inline-field" hidden>
        <label for="borderMm" class="sp-inline-label">Rand (mm)</label>
        <input type="number" id="borderMm" class="sp-num" min="0" max="50" step="0.5" value="2">
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">Befestigung</div>
      <div id="mountSeg" class="seg-group seg-sm" style="width:100%">
        <button type="button" id="mountNone" class="seg seg-active" style="flex:1">Keine</button>
        <button type="button" id="mountHole" class="seg" style="flex:1">Loch</button>
        <button type="button" id="mountLoop" class="seg" style="flex:1">Öse</button>
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">Größe (mm)</div>
      <div class="sp-size-row">
        <div class="sp-size-field">
          <label for="sizeW" class="sp-inline-label">B</label>
          <input type="number" id="sizeW" class="sp-num" min="5" max="500" step="1" value="50">
        </div>
        <div class="sp-size-field">
          <label for="sizeH" class="sp-inline-label">H</label>
          <input type="number" id="sizeH" class="sp-num" min="5" max="500" step="1" value="150">
        </div>
      </div>
    </div>
  </aside>
  <aside id="sidebarAdvanced" class="sidebar" hidden><!-- Advanced controls (Task 4) --></aside>
  <section id="preview">
    <div class="view-toggle"><button id="view2dBtn" class="seg seg-active">2D</button><button id="view3dBtn" class="seg">3D</button></div>
    <canvas id="canvas2d" width="800" height="1000"></canvas>
    <canvas id="preview3dCanvas" width="800" height="1000" hidden></canvas>
  </section>
</main>

<!-- Export dialog (kept for Task 3 rework) -->
<div id="exportModal" class="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="exportTitle">
    <div class="modal-head">
      <h2 id="exportTitle">Exportieren</h2>
      <button id="exportClose" class="modal-x" type="button" aria-label="Schließen">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <div class="field-head"><label for="exportName">Dateiname</label></div>
        <input id="exportName" type="text" class="text-input" value="ukibori">
      </div>
      <div class="field">
        <div class="field-head"><label>Format</label></div>
        <div class="export-formats">
          <button id="exportPng" class="btn" type="button">PNG <span class="hint">Bild</span></button>
          <button id="exportSvg" class="btn" type="button" disabled>SVG <span class="hint">Vektor, je Farbe</span></button>
          <button id="exportMf" class="btn btn-primary" type="button">.3mf <span class="hint">3D · S/W &amp; Farbe</span></button>
          <button id="exportStl" class="btn" type="button">STL <span class="hint">3D · Geometrie</span></button>
        </div>
      </div>
      <p id="exportStatus" class="status"></p>
    </div>
  </div>
</div>

<!-- Hidden file inputs for add-image (button wired in Task 4) -->
<input type="file" id="addImageInput" accept="image/*" hidden>

<script src="vendor/qrcode.js"></script>
<script src="js/vendor/potrace.js"></script>
<script src="js/image-ops.js"></script>
<script src="js/geometry.js"></script>
<script src="js/trace.js"></script>
<script src="js/sources.js"></script>
<script src="js/bg-removal.js"></script>
<script src="js/bookmark-model.js"></script>
<script src="js/bookmark-export.js"></script>
<script src="js/build-parts.js"></script>
<script src="js/preview3d.js"></script>
<script src="js/editor.js"></script>
<script src="js/coachmarks.js"></script>
</body>
</html>
