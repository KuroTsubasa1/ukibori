<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schwarz-Weiß-Konverter</title>
<style>
  :root {
    --bg: #f4f4f7;
    --panel: #ffffff;
    --ink: #16161a;
    --muted: #6b6b76;
    --line: #e3e3ea;
    --accent: #4f46e5;
    --accent-weak: #eef0fe;
    --danger: #c0392b;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,16,26,.04), 0 8px 24px rgba(16,16,26,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .app-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .logo {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 10px;
    background: linear-gradient(135deg, #fff 0 50%, #16161a 50% 100%);
    border: 1px solid var(--line);
    font-size: 0;
  }
  .app-header h1 { margin: 0; font-size: 17px; letter-spacing: -.01em; }
  .app-header .tagline { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }

  main {
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 18px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Dropzone */
  .dropzone {
    border: 2px dashed #c4c4cf;
    border-radius: var(--radius);
    background: var(--panel);
    padding: 30px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s, padding .15s;
  }
  .dropzone:hover { border-color: var(--accent); }
  .dropzone.dragover { border-color: var(--accent); background: var(--accent-weak); }
  .dropzone .drop-icon { font-size: 26px; line-height: 1; }
  .dropzone .drop-title { margin: 10px 0 2px; font-weight: 600; }
  .dropzone .drop-sub { margin: 0; font-size: 13px; color: var(--muted); }
  .dropzone .drop-compact { display: none; font-size: 13px; font-weight: 600; color: var(--muted); }
  .link { color: var(--accent); cursor: pointer; font-weight: 600; }

  /* Before an image is loaded the dropzone fills the empty space. */
  body:not(.has-image) .dropzone { flex: 1; display: grid; place-items: center; }
  /* After loading it collapses to a slim bar to give the preview room. */
  body.has-image .dropzone { padding: 10px 16px; }
  body.has-image .dropzone .drop-full { display: none; }
  body.has-image .dropzone .drop-compact { display: block; }

  /* Toolbar */
  [hidden] { display: none !important; }
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    transition: opacity .15s;
  }
  .toolbar.disabled { opacity: .5; pointer-events: none; }
  .fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px 24px;
    align-items: end;
  }
  .actions { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }

  /* Segmented control */
  .seg-group { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
  .seg {
    font: inherit; font-size: 13px; font-weight: 600;
    padding: 7px 14px; border: 0; border-radius: 7px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: background .12s, color .12s;
  }
  .seg:hover { color: var(--ink); }
  .seg.seg-active { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(16,16,26,.08); }
  .seg-group.seg-sm .seg { padding: 5px 11px; font-size: 12.5px; }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-head { display: flex; align-items: center; justify-content: space-between; }
  .field-head label { font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .badge {
    font-variant-numeric: tabular-nums;
    font-size: 12px; font-weight: 600;
    background: var(--accent-weak); color: var(--accent);
    padding: 2px 9px; border-radius: 999px; min-width: 34px; text-align: center;
  }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .field-actions { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }

  .btn {
    font: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    cursor: pointer; transition: background .12s, border-color .12s, transform .05s;
  }
  .btn:hover { background: #f7f7fb; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4338ca; }

  .toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  input[type=color] {
    width: 100%; max-width: 64px; height: 34px; padding: 2px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer;
  }
  .fields.circle-row { margin-top: 4px; padding-top: 16px; border-top: 1px solid var(--line); }

  .hint { font-size: 11.5px; color: var(--muted); }
  .status { margin: 0; font-size: 13px; color: var(--muted); }
  .status.error { color: var(--danger); font-weight: 600; }

  /* Preview */
  .preview {
    display: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #ececf2 25%, transparent 25%),
      linear-gradient(-45deg, #ececf2 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ececf2 75%),
      linear-gradient(-45deg, transparent 75%, #ececf2 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    box-shadow: var(--shadow);
  }
  .preview.ready {
    display: flex;
    flex: 1;
    min-height: 0;
    align-items: center;
    justify-content: center;
  }
  #output {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 2px 10px rgba(16,16,26,.18);
    background: #fff;
  }
</style>
</head>
<body>
<header class="app-header">
  <span class="logo" aria-hidden="true">◐</span>
  <div>
    <h1>Schwarz-Weiß-Konverter</h1>
    <p class="tagline">Schwarz/Weiß oder flache Farben · komplett lokal im Browser</p>
  </div>
</header>

<main>
  <section id="drop" class="dropzone" tabindex="0">
    <div class="drop-full">
      <div class="drop-icon" aria-hidden="true">⬆</div>
      <p class="drop-title">Bild hierher ziehen</p>
      <p class="drop-sub">oder <span class="link">Datei auswählen</span></p>
    </div>
    <div class="drop-compact">↻ Anderes Bild laden — ziehen oder klicken</div>
    <input id="file" type="file" accept="image/*" hidden>
  </section>

  <section id="controls" class="toolbar disabled">
    <div class="seg-group" role="tablist" aria-label="Modus">
      <button type="button" id="modeBw" class="seg seg-active">Schwarz / Weiß</button>
      <button type="button" id="modeColor" class="seg">Farben reduzieren</button>
    </div>

    <div class="fields">
      <!-- Schwarz/Weiß -->
      <div class="field mode-bw">
        <div class="field-head">
          <label for="thresh">Schwellwert</label>
          <span id="threshVal" class="badge">128</span>
        </div>
        <input id="thresh" type="range" min="0" max="255" value="128" disabled>
      </div>
      <div class="field mode-bw">
        <div class="field-head">
          <label for="island">Inseln entfernen (max. px)</label>
          <span id="islandVal" class="badge">0</span>
        </div>
        <input id="island" type="range" min="0" max="2000" value="0" disabled>
      </div>

      <!-- Farben reduzieren -->
      <div class="field mode-color" hidden>
        <div class="field-head"><label>Methode</label></div>
        <div class="seg-group seg-sm" role="tablist" aria-label="Methode">
          <button type="button" id="methPalette" class="seg seg-active">Palette</button>
          <button type="button" id="methPosterize" class="seg">Posterize</button>
        </div>
      </div>
      <div class="field mode-color meth-palette" hidden>
        <div class="field-head">
          <label for="numColors">Anzahl Farben</label>
          <span id="numColorsVal" class="badge">8</span>
        </div>
        <input id="numColors" type="range" min="2" max="32" value="8" disabled>
      </div>
      <div class="field mode-color meth-posterize" hidden>
        <div class="field-head">
          <label for="levels">Stufen pro Kanal</label>
          <span id="levelsVal" class="badge">4</span>
        </div>
        <input id="levels" type="range" min="2" max="8" value="4" disabled>
      </div>

      <!-- Aufräumen (gilt für den ganzen Farbmodus) -->
      <div class="field mode-color" hidden>
        <div class="field-head">
          <label for="colorIsland">Inseln entfernen (max. px)</label>
          <span id="colorIslandVal" class="badge">0</span>
        </div>
        <input id="colorIsland" type="range" min="0" max="2000" value="0" disabled>
      </div>
      <div class="field mode-color" hidden>
        <div class="field-head">
          <label for="smooth">Kanten glätten</label>
          <span id="smoothVal" class="badge">0</span>
        </div>
        <input id="smooth" type="range" min="0" max="5" value="0" disabled>
      </div>
    </div>

    <div class="fields circle-row">
      <div class="field">
        <label class="toggle"><input id="circleEnable" type="checkbox" disabled> Kreis zuschneiden</label>
        <span class="hint">Im Bild ziehen zum Verschieben · Mausrad zum Zoomen</span>
      </div>
      <div class="field">
        <div class="field-head">
          <label for="circleSize">Kreisgröße (Radius)</label>
          <span id="circleSizeVal" class="badge">0</span>
        </div>
        <input id="circleSize" type="range" min="10" max="1000" value="100" disabled>
      </div>
      <div class="field">
        <div class="field-head">
          <label for="circleThickness">Rahmendicke (px)</label>
          <span id="circleThicknessVal" class="badge">10</span>
        </div>
        <input id="circleThickness" type="range" min="0" max="200" value="10" disabled>
      </div>
      <div class="field">
        <div class="field-head"><label for="circleColor">Rahmenfarbe</label></div>
        <input id="circleColor" type="color" value="#000000" disabled>
      </div>
    </div>

    <div class="actions">
      <button id="otsu" class="btn mode-bw" disabled>Auto (Otsu)</button>
      <label class="toggle mode-bw"><input id="invert" type="checkbox" disabled> Invertieren</label>
      <button id="download" class="btn btn-primary" disabled>PNG herunterladen</button>
    </div>
  </section>

  <p id="status" class="status">Bereit. Lade ein Bild, um zu starten.</p>

  <section id="preview" class="preview">
    <canvas id="output"></canvas>
  </section>
</main>

<script>
"use strict";
// Perceived brightness of an RGB pixel (0..255).
function rgbToLuminance(r, g, b) {
  return 0.299 * r + 0.587 * g + 0.114 * b;
}
window.rgbToLuminance = rgbToLuminance; // exposed for verification

// Mutates the given ImageData's pixels to pure black/white. Returns it.
function applyThreshold(imageData, threshold, invert) {
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    const lum = rgbToLuminance(d[i], d[i + 1], d[i + 2]);
    let white = lum >= threshold;
    if (invert) white = !white;
    const v = white ? 255 : 0;
    d[i] = d[i + 1] = d[i + 2] = v;
    d[i + 3] = 255;
  }
  return imageData;
}
window.applyThreshold = applyThreshold;

// Otsu's method: returns the threshold (0..255) maximizing between-class variance.
function computeOtsuThreshold(imageData) {
  const d = imageData.data;
  const hist = new Array(256).fill(0);
  let total = 0;
  for (let i = 0; i < d.length; i += 4) {
    const lum = Math.round(rgbToLuminance(d[i], d[i + 1], d[i + 2]));
    hist[lum]++;
    total++;
  }
  if (total === 0) return 128;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, maxVar = -1, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    // >= breaks ties toward the upper edge of a flat variance plateau, so the
    // chosen threshold lands strictly inside the valley between two clusters.
    if (between >= maxVar) { maxVar = between; threshold = t; }
  }
  return threshold;
}
window.computeOtsuThreshold = computeOtsuThreshold;

// Removes small color "islands" from an already-binary (0/255) ImageData.
// Any 4-connected region of one color smaller than minSize pixels is recolored
// to the opposite color, so it merges into the surrounding area. Works in both
// directions (black specks in white and white specks in black). Mutates and
// returns the ImageData. minSize <= 0 is a no-op.
function removeSmallIslands(imageData, minSize) {
  if (minSize <= 0) return imageData;
  const { width, height, data } = imageData;
  const n = width * height;
  const visited = new Uint8Array(n);
  const stack = new Int32Array(n);   // pixel indices to expand
  const region = new Int32Array(n);  // pixel indices in the current region
  for (let p = 0; p < n; p++) {
    if (visited[p]) continue;
    const color = data[p * 4]; // 0 or 255
    let sp = 0, count = 0;
    stack[sp++] = p;
    visited[p] = 1;
    while (sp > 0) {
      const q = stack[--sp];
      region[count++] = q;
      const x = q % width;
      const y = (q - x) / width;
      if (x > 0)          { const r = q - 1;     if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (x < width - 1)  { const r = q + 1;     if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (y > 0)          { const r = q - width; if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (y < height - 1) { const r = q + width; if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
    }
    if (count < minSize) {
      const opp = color === 0 ? 255 : 0;
      for (let k = 0; k < count; k++) {
        const idx = region[k] * 4;
        data[idx] = data[idx + 1] = data[idx + 2] = opp;
        data[idx + 3] = 255;
      }
    }
  }
  return imageData;
}
window.removeSmallIslands = removeSmallIslands;

// Posterize: reduce each RGB channel to `levels` evenly-spaced steps, which
// collapses smooth gradients into flat bands. Mutates and returns the ImageData.
function posterize(imageData, levels) {
  if (levels < 2) levels = 2;
  const d = imageData.data;
  const step = 255 / (levels - 1);
  for (let i = 0; i < d.length; i += 4) {
    d[i]     = Math.round(Math.round(d[i]     / step) * step);
    d[i + 1] = Math.round(Math.round(d[i + 1] / step) * step);
    d[i + 2] = Math.round(Math.round(d[i + 2] / step) * step);
  }
  return imageData;
}
window.posterize = posterize;

// Median-cut color quantization: reduce the image to at most `numColors`
// representative flat colors and map every pixel to the nearest one. The
// palette is built from a sample of pixels for speed; mapping covers all
// pixels. Mutates and returns the ImageData.
function quantizeMedianCut(imageData, numColors) {
  const d = imageData.data;
  const n = d.length / 4;
  if (n === 0 || numColors < 1) return imageData;

  // 1. Sample pixels (cap the work for large images).
  const maxSamples = 20000;
  const stepPx = Math.max(1, Math.floor(n / maxSamples));
  const samples = [];
  for (let p = 0; p < n; p += stepPx) {
    const i = p * 4;
    samples.push([d[i], d[i + 1], d[i + 2]]);
  }

  // 2. Repeatedly split the bucket with the widest color range at its median.
  let buckets = [samples];
  while (buckets.length < numColors) {
    let bi = -1, bestRange = -1, bestCh = 0;
    for (let b = 0; b < buckets.length; b++) {
      const bk = buckets[b];
      if (bk.length < 2) continue;
      const min = [255, 255, 255], max = [0, 0, 0];
      for (const s of bk) for (let c = 0; c < 3; c++) {
        if (s[c] < min[c]) min[c] = s[c];
        if (s[c] > max[c]) max[c] = s[c];
      }
      for (let c = 0; c < 3; c++) {
        const r = max[c] - min[c];
        if (r > bestRange) { bestRange = r; bi = b; bestCh = c; }
      }
    }
    if (bi < 0) break; // nothing left to split
    const bk = buckets[bi];
    bk.sort((a, b) => a[bestCh] - b[bestCh]);
    const mid = bk.length >> 1;
    buckets.splice(bi, 1, bk.slice(0, mid), bk.slice(mid));
  }

  // 3. Palette = average color of each bucket.
  const palette = buckets.map(bk => {
    let r = 0, g = 0, b = 0;
    for (const s of bk) { r += s[0]; g += s[1]; b += s[2]; }
    const len = bk.length || 1;
    return [Math.round(r / len), Math.round(g / len), Math.round(b / len)];
  });

  // 4. Map every pixel to its nearest palette color (Euclidean in RGB).
  for (let p = 0; p < n; p++) {
    const i = p * 4;
    const r = d[i], g = d[i + 1], b = d[i + 2];
    let best = 0, bestDist = Infinity;
    for (let k = 0; k < palette.length; k++) {
      const pc = palette[k];
      const dr = r - pc[0], dg = g - pc[1], db = b - pc[2];
      const dist = dr * dr + dg * dg + db * db;
      if (dist < bestDist) { bestDist = dist; best = k; }
    }
    const pc = palette[best];
    d[i] = pc[0]; d[i + 1] = pc[1]; d[i + 2] = pc[2];
  }
  return imageData;
}
window.quantizeMedianCut = quantizeMedianCut;

// Removes small color islands from a flat-color image (any number of colors).
// Each 4-connected region of one exact color smaller than minSize pixels is
// recolored to the color that borders it most, dissolving specks into their
// surroundings. Mutates and returns the ImageData. minSize <= 0 is a no-op.
function removeSmallColorIslands(imageData, minSize) {
  if (minSize <= 0) return imageData;
  const { width, height, data } = imageData;
  const n = width * height;
  const visited = new Uint8Array(n);
  const stack = new Int32Array(n);
  const region = new Int32Array(n);
  const colorOf = (p) => { const i = p * 4; return (data[i] << 16) | (data[i + 1] << 8) | data[i + 2]; };
  for (let p = 0; p < n; p++) {
    if (visited[p]) continue;
    const color = colorOf(p);
    const border = new Map(); // neighboring color -> shared edge count
    let sp = 0, count = 0;
    stack[sp++] = p; visited[p] = 1;
    while (sp > 0) {
      const q = stack[--sp];
      region[count++] = q;
      const x = q % width, y = (q - x) / width;
      const neighbors = [];
      if (x > 0) neighbors.push(q - 1);
      if (x < width - 1) neighbors.push(q + 1);
      if (y > 0) neighbors.push(q - width);
      if (y < height - 1) neighbors.push(q + width);
      for (const r of neighbors) {
        const nc = colorOf(r);
        if (nc === color) {
          if (!visited[r]) { visited[r] = 1; stack[sp++] = r; }
        } else {
          border.set(nc, (border.get(nc) || 0) + 1);
        }
      }
    }
    if (count < minSize && border.size > 0) {
      let bestC = -1, bestN = -1;
      for (const [c, cnt] of border) { if (cnt > bestN) { bestN = cnt; bestC = c; } }
      const r = (bestC >> 16) & 255, g = (bestC >> 8) & 255, b = bestC & 255;
      for (let k = 0; k < count; k++) { const idx = region[k] * 4; data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; }
    }
  }
  return imageData;
}
window.removeSmallColorIslands = removeSmallColorIslands;

// Majority filter: each pixel becomes the most common color in its 3x3
// neighborhood, run `passes` times. Smooths ragged edges and clears isolated
// pixels on flat-color images. Mutates and returns the ImageData. 0 = no-op.
function majorityFilter(imageData, passes) {
  if (passes <= 0) return imageData;
  const { width, height, data } = imageData;
  for (let pass = 0; pass < passes; pass++) {
    const src = new Uint8ClampedArray(data); // read from a stable snapshot
    const counts = new Map();
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        counts.clear();
        let bestC = -1, bestN = -1;
        for (let dy = -1; dy <= 1; dy++) {
          const yy = y + dy; if (yy < 0 || yy >= height) continue;
          for (let dx = -1; dx <= 1; dx++) {
            const xx = x + dx; if (xx < 0 || xx >= width) continue;
            const i = (yy * width + xx) * 4;
            const c = (src[i] << 16) | (src[i + 1] << 8) | src[i + 2];
            const v = (counts.get(c) || 0) + 1;
            counts.set(c, v);
            if (v > bestN) { bestN = v; bestC = c; }
          }
        }
        const o = (y * width + x) * 4;
        data[o] = (bestC >> 16) & 255; data[o + 1] = (bestC >> 8) & 255; data[o + 2] = bestC & 255;
      }
    }
  }
  return imageData;
}
window.majorityFilter = majorityFilter;

// Crops the image to a circle centered at (cx, cy) with radius R: paints a ring
// of `thickness` pixels in ringColor ([r,g,b]) just inside the circle's edge,
// fills everything outside the circle white, and leaves the inside untouched.
// Mutates and returns the ImageData.
function applyCircleMask(imageData, thickness, ringColor, cx, cy, R) {
  const { width, height, data } = imageData;
  const inner = Math.max(0, R - Math.max(0, thickness));
  const R2 = R * R, inner2 = inner * inner;
  const [rr, rg, rb] = ringColor;
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const dx = x - cx, dy = y - cy;
      const d2 = dx * dx + dy * dy;
      const i = (y * width + x) * 4;
      if (d2 > R2) {                 // outside the circle -> white
        data[i] = 255; data[i + 1] = 255; data[i + 2] = 255; data[i + 3] = 255;
      } else if (d2 > inner2) {      // ring band
        data[i] = rr; data[i + 1] = rg; data[i + 2] = rb; data[i + 3] = 255;
      }                              // else: inside, keep the image as-is
    }
  }
  return imageData;
}
window.applyCircleMask = applyCircleMask;

// "#rrggbb" -> [r, g, b]
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

const els = {
  drop: document.getElementById('drop'),
  file: document.getElementById('file'),
  thresh: document.getElementById('thresh'),
  threshVal: document.getElementById('threshVal'),
  island: document.getElementById('island'),
  islandVal: document.getElementById('islandVal'),
  otsu: document.getElementById('otsu'),
  invert: document.getElementById('invert'),
  modeBw: document.getElementById('modeBw'),
  modeColor: document.getElementById('modeColor'),
  methPalette: document.getElementById('methPalette'),
  methPosterize: document.getElementById('methPosterize'),
  numColors: document.getElementById('numColors'),
  numColorsVal: document.getElementById('numColorsVal'),
  levels: document.getElementById('levels'),
  levelsVal: document.getElementById('levelsVal'),
  colorIsland: document.getElementById('colorIsland'),
  colorIslandVal: document.getElementById('colorIslandVal'),
  smooth: document.getElementById('smooth'),
  smoothVal: document.getElementById('smoothVal'),
  circleEnable: document.getElementById('circleEnable'),
  circleSize: document.getElementById('circleSize'),
  circleSizeVal: document.getElementById('circleSizeVal'),
  circleThickness: document.getElementById('circleThickness'),
  circleThicknessVal: document.getElementById('circleThicknessVal'),
  circleColor: document.getElementById('circleColor'),
  download: document.getElementById('download'),
  output: document.getElementById('output'),
  preview: document.getElementById('preview'),
  controls: document.getElementById('controls'),
  status: document.getElementById('status'),
};

let mode = 'bw';            // 'bw' | 'color'
let colorMethod = 'palette'; // 'palette' | 'posterize'

const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });
let originalData = null;  // ImageData at full resolution
let processedData = null; // cached mode+cleanup result (no circle)

function setStatus(msg, isError) {
  els.status.textContent = msg;
  els.status.className = isError ? 'status error' : 'status';
}

function enableControls(on) {
  els.controls.classList.toggle('disabled', !on);
  [els.thresh, els.island, els.otsu, els.invert, els.numColors, els.levels,
   els.colorIsland, els.smooth, els.circleEnable, els.circleSize,
   els.circleThickness, els.circleColor, els.download]
    .forEach(e => { e.disabled = !on; });
}

function setThreshold(t) {
  els.thresh.value = t;
  els.threshVal.textContent = t;
}

// Show only the controls that belong to the current mode and color method.
function updateControlVisibility() {
  const bw = mode === 'bw';
  const palette = colorMethod === 'palette';
  document.querySelectorAll('.mode-bw').forEach(e => { e.hidden = !bw; });
  document.querySelectorAll('.mode-color').forEach(e => { e.hidden = bw; });
  document.querySelectorAll('.meth-palette').forEach(e => { e.hidden = bw || !palette; });
  document.querySelectorAll('.meth-posterize').forEach(e => { e.hidden = bw || palette; });
  els.modeBw.classList.toggle('seg-active', bw);
  els.modeColor.classList.toggle('seg-active', !bw);
  els.methPalette.classList.toggle('seg-active', palette);
  els.methPosterize.classList.toggle('seg-active', !palette);
}

const circle = { cx: 0, cy: 0, r: 0 }; // selection in image coordinates

// Mode + cleanup, without the circle. Returns a fresh ImageData.
function processImage() {
  const copy = new ImageData(
    new Uint8ClampedArray(originalData.data),
    originalData.width,
    originalData.height
  );
  if (mode === 'bw') {
    applyThreshold(copy, Number(els.thresh.value), els.invert.checked);
    removeSmallIslands(copy, Number(els.island.value));
  } else {
    if (colorMethod === 'palette') {
      quantizeMedianCut(copy, Number(els.numColors.value));
    } else {
      posterize(copy, Number(els.levels.value));
    }
    removeSmallColorIslands(copy, Number(els.colorIsland.value));
    majorityFilter(copy, Number(els.smooth.value));
  }
  return copy;
}

// Draws the interactive editing preview: the full processed image, with the
// area outside the circle dimmed and the ring shown as a guide. The real
// white-filled crop is only produced on export (see exportData).
function paint() {
  if (!processedData) return;
  const out = els.output;
  out.width = processedData.width;
  out.height = processedData.height;
  const ctx = out.getContext('2d');
  ctx.putImageData(processedData, 0, 0);
  if (els.circleEnable.checked) {
    const { cx, cy, r } = circle;
    const t = Number(els.circleThickness.value);
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, out.width, out.height);
    ctx.arc(cx, cy, r, 0, Math.PI * 2, true); // reverse winding -> hole at circle
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill('evenodd');
    ctx.restore();
    if (t > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(0, r - t / 2), 0, Math.PI * 2);
      ctx.lineWidth = t;
      ctx.strokeStyle = els.circleColor.value;
      ctx.stroke();
    }
  }
  els.preview.classList.add('ready');
}

// Full recompute (mode + cleanup), then repaint.
function render() {
  if (!originalData) return;
  processedData = processImage();
  paint();
}

// Final image for export: processed image with the real circle mask applied.
function exportData() {
  const copy = new ImageData(
    new Uint8ClampedArray(processedData.data),
    processedData.width,
    processedData.height
  );
  if (els.circleEnable.checked) {
    applyCircleMask(copy, Number(els.circleThickness.value),
      hexToRgb(els.circleColor.value), circle.cx, circle.cy, circle.r);
  }
  return copy;
}

function updateCircleCursor() {
  els.output.style.cursor = els.circleEnable.checked ? 'grab' : 'default';
}

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('Bitte eine Bilddatei auswählen.', true);
    return;
  }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    try {
      offscreen.width = img.naturalWidth;
      offscreen.height = img.naturalHeight;
      offCtx.drawImage(img, 0, 0);
      originalData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
    } catch (e) {
      setStatus('Bild ist zu groß zum Verarbeiten.', true);
      return;
    }
    enableControls(true);
    document.body.classList.add('has-image');
    setThreshold(computeOtsuThreshold(originalData)); // start at the auto value
    // Default circle: largest centered circle that fits the image.
    const w = originalData.width, h = originalData.height;
    circle.cx = w / 2;
    circle.cy = h / 2;
    circle.r = Math.min(w, h) / 2;
    els.circleSize.min = 10;
    els.circleSize.max = Math.round(Math.hypot(w, h) / 2);
    els.circleSize.value = Math.round(circle.r);
    els.circleSizeVal.textContent = Math.round(circle.r);
    updateCircleCursor();
    setStatus(`Geladen: ${img.naturalWidth}×${img.naturalHeight}px`, false);
    render();
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    setStatus('Bild konnte nicht geladen werden.', true);
  };
  img.src = url;
}
window.loadFile = loadFile; // exposed for verification

// Additional exposures so browser_evaluate assertions can reach otherwise
// script-scoped state.
window.els = els;
window.offscreen = offscreen;
window.offCtx = offCtx;
window.render = render;
window.paint = paint;
window.exportData = exportData;
window.circle = circle;
Object.defineProperty(window, 'originalData', {
  get() { return originalData; },
  set(v) { originalData = v; },
});

els.drop.addEventListener('click', () => els.file.click());
els.file.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
['dragenter', 'dragover'].forEach(ev =>
  els.drop.addEventListener(ev, e => { e.preventDefault(); els.drop.classList.add('dragover'); }));
['dragleave', 'drop'].forEach(ev =>
  els.drop.addEventListener(ev, e => { e.preventDefault(); els.drop.classList.remove('dragover'); }));
els.drop.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

els.thresh.addEventListener('input', () => {
  els.threshVal.textContent = els.thresh.value;
  render();
});
els.island.addEventListener('input', () => {
  els.islandVal.textContent = els.island.value;
  render();
});
els.invert.addEventListener('change', render);
els.otsu.addEventListener('click', () => {
  if (!originalData) return;
  setThreshold(computeOtsuThreshold(originalData));
  render();
});

els.numColors.addEventListener('input', () => {
  els.numColorsVal.textContent = els.numColors.value;
  render();
});
els.levels.addEventListener('input', () => {
  els.levelsVal.textContent = els.levels.value;
  render();
});
els.colorIsland.addEventListener('input', () => {
  els.colorIslandVal.textContent = els.colorIsland.value;
  render();
});
els.smooth.addEventListener('input', () => {
  els.smoothVal.textContent = els.smooth.value;
  render();
});
els.circleEnable.addEventListener('change', () => { updateCircleCursor(); paint(); });
els.circleSize.addEventListener('input', () => {
  circle.r = Number(els.circleSize.value);
  els.circleSizeVal.textContent = els.circleSize.value;
  paint();
});
els.circleThickness.addEventListener('input', () => {
  els.circleThicknessVal.textContent = els.circleThickness.value;
  paint();
});
els.circleColor.addEventListener('input', paint);

// Drag on the preview to move the circle; wheel to zoom its radius.
let dragging = false, lastX = 0, lastY = 0;
els.output.addEventListener('pointerdown', e => {
  if (!els.circleEnable.checked || !processedData) return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  els.output.setPointerCapture(e.pointerId);
  els.output.style.cursor = 'grabbing';
  e.preventDefault();
});
els.output.addEventListener('pointermove', e => {
  if (!dragging) return;
  const rect = els.output.getBoundingClientRect();
  const scale = els.output.width / rect.width; // image px per client px
  circle.cx = Math.max(0, Math.min(els.output.width, circle.cx + (e.clientX - lastX) * scale));
  circle.cy = Math.max(0, Math.min(els.output.height, circle.cy + (e.clientY - lastY) * scale));
  lastX = e.clientX; lastY = e.clientY;
  paint();
});
function endDrag() {
  if (!dragging) return;
  dragging = false;
  updateCircleCursor();
}
els.output.addEventListener('pointerup', endDrag);
els.output.addEventListener('pointercancel', endDrag);
els.output.addEventListener('wheel', e => {
  if (!els.circleEnable.checked || !processedData) return;
  e.preventDefault();
  const min = Number(els.circleSize.min), max = Number(els.circleSize.max);
  const next = Math.max(min, Math.min(max, circle.r * (e.deltaY < 0 ? 1.06 : 0.94)));
  circle.r = next;
  els.circleSize.value = Math.round(next);
  els.circleSizeVal.textContent = Math.round(next);
  paint();
}, { passive: false });

function setMode(m) {
  mode = m;
  updateControlVisibility();
  render();
}
function setColorMethod(m) {
  colorMethod = m;
  updateControlVisibility();
  render();
}
els.modeBw.addEventListener('click', () => setMode('bw'));
els.modeColor.addEventListener('click', () => setMode('color'));
els.methPalette.addEventListener('click', () => setColorMethod('palette'));
els.methPosterize.addEventListener('click', () => setColorMethod('posterize'));

els.download.addEventListener('click', () => {
  if (!processedData) return;
  const data = exportData();
  const tmp = document.createElement('canvas');
  tmp.width = data.width;
  tmp.height = data.height;
  tmp.getContext('2d').putImageData(data, 0, 0);
  const a = document.createElement('a');
  a.download = mode === 'bw' ? 'schwarz-weiss.png' : 'farben-reduziert.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
});

updateControlVisibility();
</script>
</body>
</html>
