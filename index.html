<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schwarz-Weiß-Konverter</title>
<style>
  :root {
    --bg: #f4f4f7;
    --panel: #ffffff;
    --ink: #16161a;
    --muted: #6b6b76;
    --line: #e3e3ea;
    --accent: #4f46e5;
    --accent-weak: #eef0fe;
    --danger: #c0392b;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,16,26,.04), 0 8px 24px rgba(16,16,26,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .app-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .logo {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 10px;
    background: linear-gradient(135deg, #fff 0 50%, #16161a 50% 100%);
    border: 1px solid var(--line);
    font-size: 0;
  }
  .app-header h1 { margin: 0; font-size: 17px; letter-spacing: -.01em; }
  .app-header .tagline { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }

  main {
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 18px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Dropzone */
  .dropzone {
    border: 2px dashed #c4c4cf;
    border-radius: var(--radius);
    background: var(--panel);
    padding: 30px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s, padding .15s;
  }
  .dropzone:hover { border-color: var(--accent); }
  .dropzone.dragover { border-color: var(--accent); background: var(--accent-weak); }
  .dropzone .drop-icon { font-size: 26px; line-height: 1; }
  .dropzone .drop-title { margin: 10px 0 2px; font-weight: 600; }
  .dropzone .drop-sub { margin: 0; font-size: 13px; color: var(--muted); }
  .dropzone .drop-compact { display: none; font-size: 13px; font-weight: 600; color: var(--muted); }
  .link { color: var(--accent); cursor: pointer; font-weight: 600; }

  /* Before an image is loaded the dropzone fills the empty space. */
  body:not(.has-image) .dropzone { flex: 1; display: grid; place-items: center; }
  /* After loading it collapses to a slim bar to give the preview room. */
  body.has-image .dropzone { padding: 10px 16px; }
  body.has-image .dropzone .drop-full { display: none; }
  body.has-image .dropzone .drop-compact { display: block; }

  /* Toolbar */
  .toolbar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px 24px;
    align-items: end;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    transition: opacity .15s;
  }
  .toolbar.disabled { opacity: .5; pointer-events: none; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-head { display: flex; align-items: center; justify-content: space-between; }
  .field-head label { font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .badge {
    font-variant-numeric: tabular-nums;
    font-size: 12px; font-weight: 600;
    background: var(--accent-weak); color: var(--accent);
    padding: 2px 9px; border-radius: 999px; min-width: 34px; text-align: center;
  }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .field-actions { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }

  .btn {
    font: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    cursor: pointer; transition: background .12s, border-color .12s, transform .05s;
  }
  .btn:hover { background: #f7f7fb; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4338ca; }

  .toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  .status { margin: 0; font-size: 13px; color: var(--muted); }
  .status.error { color: var(--danger); font-weight: 600; }

  /* Preview */
  .preview {
    display: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #ececf2 25%, transparent 25%),
      linear-gradient(-45deg, #ececf2 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ececf2 75%),
      linear-gradient(-45deg, transparent 75%, #ececf2 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    box-shadow: var(--shadow);
  }
  .preview.ready {
    display: flex;
    flex: 1;
    min-height: 0;
    align-items: center;
    justify-content: center;
  }
  #output {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 2px 10px rgba(16,16,26,.18);
    background: #fff;
  }
</style>
</head>
<body>
<header class="app-header">
  <span class="logo" aria-hidden="true">◐</span>
  <div>
    <h1>Schwarz-Weiß-Konverter</h1>
    <p class="tagline">Farbbild → reines Schwarz/Weiß · komplett lokal im Browser</p>
  </div>
</header>

<main>
  <section id="drop" class="dropzone" tabindex="0">
    <div class="drop-full">
      <div class="drop-icon" aria-hidden="true">⬆</div>
      <p class="drop-title">Bild hierher ziehen</p>
      <p class="drop-sub">oder <span class="link">Datei auswählen</span></p>
    </div>
    <div class="drop-compact">↻ Anderes Bild laden — ziehen oder klicken</div>
    <input id="file" type="file" accept="image/*" hidden>
  </section>

  <section id="controls" class="toolbar disabled">
    <div class="field">
      <div class="field-head">
        <label for="thresh">Schwellwert</label>
        <span id="threshVal" class="badge">128</span>
      </div>
      <input id="thresh" type="range" min="0" max="255" value="128" disabled>
    </div>

    <div class="field">
      <div class="field-head">
        <label for="island">Inseln entfernen (max. px)</label>
        <span id="islandVal" class="badge">0</span>
      </div>
      <input id="island" type="range" min="0" max="2000" value="0" disabled>
    </div>

    <div class="field field-actions">
      <button id="otsu" class="btn" disabled>Auto (Otsu)</button>
      <label class="toggle"><input id="invert" type="checkbox" disabled> Invertieren</label>
      <button id="download" class="btn btn-primary" disabled>PNG herunterladen</button>
    </div>
  </section>

  <p id="status" class="status">Bereit. Lade ein Bild, um zu starten.</p>

  <section id="preview" class="preview">
    <canvas id="output"></canvas>
  </section>
</main>

<script>
"use strict";
// Perceived brightness of an RGB pixel (0..255).
function rgbToLuminance(r, g, b) {
  return 0.299 * r + 0.587 * g + 0.114 * b;
}
window.rgbToLuminance = rgbToLuminance; // exposed for verification

// Mutates the given ImageData's pixels to pure black/white. Returns it.
function applyThreshold(imageData, threshold, invert) {
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    const lum = rgbToLuminance(d[i], d[i + 1], d[i + 2]);
    let white = lum >= threshold;
    if (invert) white = !white;
    const v = white ? 255 : 0;
    d[i] = d[i + 1] = d[i + 2] = v;
    d[i + 3] = 255;
  }
  return imageData;
}
window.applyThreshold = applyThreshold;

// Otsu's method: returns the threshold (0..255) maximizing between-class variance.
function computeOtsuThreshold(imageData) {
  const d = imageData.data;
  const hist = new Array(256).fill(0);
  let total = 0;
  for (let i = 0; i < d.length; i += 4) {
    const lum = Math.round(rgbToLuminance(d[i], d[i + 1], d[i + 2]));
    hist[lum]++;
    total++;
  }
  if (total === 0) return 128;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, maxVar = -1, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    // >= breaks ties toward the upper edge of a flat variance plateau, so the
    // chosen threshold lands strictly inside the valley between two clusters.
    if (between >= maxVar) { maxVar = between; threshold = t; }
  }
  return threshold;
}
window.computeOtsuThreshold = computeOtsuThreshold;

// Removes small color "islands" from an already-binary (0/255) ImageData.
// Any 4-connected region of one color smaller than minSize pixels is recolored
// to the opposite color, so it merges into the surrounding area. Works in both
// directions (black specks in white and white specks in black). Mutates and
// returns the ImageData. minSize <= 0 is a no-op.
function removeSmallIslands(imageData, minSize) {
  if (minSize <= 0) return imageData;
  const { width, height, data } = imageData;
  const n = width * height;
  const visited = new Uint8Array(n);
  const stack = new Int32Array(n);   // pixel indices to expand
  const region = new Int32Array(n);  // pixel indices in the current region
  for (let p = 0; p < n; p++) {
    if (visited[p]) continue;
    const color = data[p * 4]; // 0 or 255
    let sp = 0, count = 0;
    stack[sp++] = p;
    visited[p] = 1;
    while (sp > 0) {
      const q = stack[--sp];
      region[count++] = q;
      const x = q % width;
      const y = (q - x) / width;
      if (x > 0)          { const r = q - 1;     if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (x < width - 1)  { const r = q + 1;     if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (y > 0)          { const r = q - width; if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
      if (y < height - 1) { const r = q + width; if (!visited[r] && data[r * 4] === color) { visited[r] = 1; stack[sp++] = r; } }
    }
    if (count < minSize) {
      const opp = color === 0 ? 255 : 0;
      for (let k = 0; k < count; k++) {
        const idx = region[k] * 4;
        data[idx] = data[idx + 1] = data[idx + 2] = opp;
        data[idx + 3] = 255;
      }
    }
  }
  return imageData;
}
window.removeSmallIslands = removeSmallIslands;

const els = {
  drop: document.getElementById('drop'),
  file: document.getElementById('file'),
  thresh: document.getElementById('thresh'),
  threshVal: document.getElementById('threshVal'),
  island: document.getElementById('island'),
  islandVal: document.getElementById('islandVal'),
  otsu: document.getElementById('otsu'),
  invert: document.getElementById('invert'),
  download: document.getElementById('download'),
  output: document.getElementById('output'),
  preview: document.getElementById('preview'),
  controls: document.getElementById('controls'),
  status: document.getElementById('status'),
};

const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });
let originalData = null; // ImageData at full resolution

function setStatus(msg, isError) {
  els.status.textContent = msg;
  els.status.className = isError ? 'status error' : 'status';
}

function enableControls(on) {
  els.controls.classList.toggle('disabled', !on);
  [els.thresh, els.island, els.otsu, els.invert, els.download].forEach(e => { e.disabled = !on; });
}

function render() {
  if (!originalData) return;
  const out = els.output;
  out.width = originalData.width;
  out.height = originalData.height;
  const ctx = out.getContext('2d');
  const copy = new ImageData(
    new Uint8ClampedArray(originalData.data),
    originalData.width,
    originalData.height
  );
  applyThreshold(copy, Number(els.thresh.value), els.invert.checked);
  removeSmallIslands(copy, Number(els.island.value));
  ctx.putImageData(copy, 0, 0);
  els.preview.classList.add('ready');
}

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('Bitte eine Bilddatei auswählen.', true);
    return;
  }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    try {
      offscreen.width = img.naturalWidth;
      offscreen.height = img.naturalHeight;
      offCtx.drawImage(img, 0, 0);
      originalData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
    } catch (e) {
      setStatus('Bild ist zu groß zum Verarbeiten.', true);
      return;
    }
    enableControls(true);
    document.body.classList.add('has-image');
    setStatus(`Geladen: ${img.naturalWidth}×${img.naturalHeight}px`, false);
    render();
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    setStatus('Bild konnte nicht geladen werden.', true);
  };
  img.src = url;
}
window.loadFile = loadFile; // exposed for verification

// Additional exposures so browser_evaluate assertions can reach otherwise
// script-scoped state.
window.els = els;
window.offscreen = offscreen;
window.offCtx = offCtx;
window.render = render;
Object.defineProperty(window, 'originalData', {
  get() { return originalData; },
  set(v) { originalData = v; },
});

els.drop.addEventListener('click', () => els.file.click());
els.file.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
['dragenter', 'dragover'].forEach(ev =>
  els.drop.addEventListener(ev, e => { e.preventDefault(); els.drop.classList.add('dragover'); }));
['dragleave', 'drop'].forEach(ev =>
  els.drop.addEventListener(ev, e => { e.preventDefault(); els.drop.classList.remove('dragover'); }));
els.drop.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

els.thresh.addEventListener('input', () => {
  els.threshVal.textContent = els.thresh.value;
  render();
});
els.island.addEventListener('input', () => {
  els.islandVal.textContent = els.island.value;
  render();
});
els.invert.addEventListener('change', render);
els.otsu.addEventListener('click', () => {
  if (!originalData) return;
  const t = computeOtsuThreshold(originalData);
  els.thresh.value = t;
  els.threshVal.textContent = t;
  render();
});

els.download.addEventListener('click', () => {
  if (!originalData) return;
  const a = document.createElement('a');
  a.download = 'schwarz-weiss.png';
  a.href = els.output.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
