<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schwarz-Weiß-Konverter</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f4f4f4; color: #111; }
  header { padding: 16px 20px; background: #111; color: #fff; }
  header h1 { margin: 0; font-size: 18px; }
  main { padding: 20px; max-width: 900px; margin: 0 auto; }
  #drop { border: 2px dashed #999; border-radius: 8px; padding: 28px; text-align: center; background: #fff; }
  #drop.dragover { border-color: #111; background: #eee; }
  .link { color: #06c; cursor: pointer; text-decoration: underline; }
  #controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin: 16px 0; }
  #controls.disabled { opacity: 0.5; }
  #output { max-width: 100%; height: auto; image-rendering: pixelated; border: 1px solid #ccc; background: #fff; display: none; }
  #output.ready { display: block; }
  button { padding: 6px 12px; cursor: pointer; }
  .error { color: #b00; }
</style>
</head>
<body>
<header><h1>Schwarz-Weiß-Konverter</h1></header>
<main>
  <div id="drop" tabindex="0">
    <p>Bild hierher ziehen oder <label class="link">auswählen<input id="file" type="file" accept="image/*" hidden></label></p>
  </div>

  <div id="controls" class="disabled">
    <label>Schwellwert: <span id="threshVal">128</span>
      <input id="thresh" type="range" min="0" max="255" value="128" disabled>
    </label>
    <button id="otsu" disabled>Auto (Otsu)</button>
    <label><input id="invert" type="checkbox" disabled> Invertieren</label>
    <button id="download" disabled>PNG herunterladen</button>
  </div>

  <p id="status">Bereit. Lade ein Bild, um zu starten.</p>
  <canvas id="output"></canvas>
</main>
<script>
"use strict";
// Perceived brightness of an RGB pixel (0..255).
function rgbToLuminance(r, g, b) {
  return 0.299 * r + 0.587 * g + 0.114 * b;
}
window.rgbToLuminance = rgbToLuminance; // exposed for verification

// Mutates the given ImageData's pixels to pure black/white. Returns it.
function applyThreshold(imageData, threshold, invert) {
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    const lum = rgbToLuminance(d[i], d[i + 1], d[i + 2]);
    let white = lum >= threshold;
    if (invert) white = !white;
    const v = white ? 255 : 0;
    d[i] = d[i + 1] = d[i + 2] = v;
    d[i + 3] = 255;
  }
  return imageData;
}
window.applyThreshold = applyThreshold;

// Otsu's method: returns the threshold (0..255) maximizing between-class variance.
function computeOtsuThreshold(imageData) {
  const d = imageData.data;
  const hist = new Array(256).fill(0);
  let total = 0;
  for (let i = 0; i < d.length; i += 4) {
    const lum = Math.round(rgbToLuminance(d[i], d[i + 1], d[i + 2]));
    hist[lum]++;
    total++;
  }
  if (total === 0) return 128;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, maxVar = -1, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    // >= breaks ties toward the upper edge of a flat variance plateau, so the
    // chosen threshold lands strictly inside the valley between two clusters.
    if (between >= maxVar) { maxVar = between; threshold = t; }
  }
  return threshold;
}
window.computeOtsuThreshold = computeOtsuThreshold;
// implementation grows over the following tasks
</script>
</body>
</html>
